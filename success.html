<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to tennisIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f1210;--bg2:#141714;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--text:#dde3da;--text2:#a8b0a4;--muted:#5c6459;--green:#5db87a;--green-dim:rgba(93,184,122,0.1);--green-border:rgba(93,184,122,0.2);--mono:"DM Mono",monospace;--sans:"Instrument Sans",sans-serif;--serif:"Instrument Serif",serif;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
.card{background:var(--bg2);border:1px solid var(--border);padding:48px;max-width:480px;width:100%;text-align:center;}
.check{width:48px;height:48px;border-radius:50%;background:var(--green-dim);border:1px solid var(--green-border);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:20px;}
.title{font-family:var(--serif);font-size:28px;color:var(--text);margin-bottom:8px;letter-spacing:-0.5px;}
.tier-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--green);border:1px solid var(--green-border);padding:4px 12px;margin-bottom:16px;}
.sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:32px;}
.btn-primary{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;background:var(--green);color:#0a1a0f;padding:13px 24px;text-decoration:none;font-weight:500;margin-bottom:10px;}
.btn-secondary{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:12px 24px;}
.divider{height:1px;background:var(--border);margin:24px 0;}
.manage-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.manage-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted);background:transparent;border:1px solid var(--border);padding:8px 16px;cursor:pointer;width:100%;}
.manage-btn:hover{color:var(--text);border-color:var(--border2);}
.logo{font-family:var(--serif);font-size:15px;color:var(--muted);margin-bottom:32px;}
.logo em{color:var(--green);font-style:italic;}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4SM1208R12"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-4SM1208R12");
</script>
</head>
<body>
<div class="logo">Tennis<em>IQ</em></div>
<div class="card">
  <div class="check">✓</div>
  <h1 class="title">You're all set.</h1>
  <div class="tier-badge" id="tier-badge">LOADING...</div>
  <p class="sub" id="success-msg">Your subscription is active.</p>
  <a href="/tennisiq.html" class="btn-primary">View Today's Predictions ↗</a>
  <a href="/" class="btn-secondary">Back to Home</a>
  <div class="divider"></div>
  <div class="manage-label">Subscription Management</div>
  <button class="manage-btn" id="manage-btn" onclick="openPortal()">Manage Subscription ↗</button>
</div>
<script>
var API_URL = "https://tennishq-api.vercel.app";
function getParam(n){return new URLSearchParams(window.location.search).get(n);}
var sessionId=getParam("session_id"), tier=getParam("tier")||"pro";
if(tier) localStorage.setItem("tiq_tier",tier);
var names={pro:"Pro",sharp:"Sharp"};
document.getElementById("tier-badge").textContent="tennisIQ "+(names[tier]||tier).toUpperCase()+" · ACTIVE";
var msgs={pro:"Your Pro subscription is active. You now have access to all predictions, the full Matchup DNA breakdown, model intelligence, fatigue and momentum data.",sharp:"Your Sharp subscription is active. You now have full access including upset alerts, the CLV calculator on every match, and daily email digest of top picks."};
document.getElementById("success-msg").textContent=msgs[tier]||msgs.pro;
async function openPortal(){
  var btn=document.getElementById("manage-btn");
  if(!sessionId){alert("Session ID not found.");return;}
  btn.textContent="Loading...";btn.disabled=true;
  try{
    var res=await fetch(API_URL+"/api/customer-portal",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId})});
    var d=await res.json();
    if(d.url) window.location.href=d.url;
    else{btn.textContent="Manage Subscription ↗";btn.disabled=false;alert("Unable to open portal.");}
  }catch(e){btn.textContent="Manage Subscription ↗";btn.disabled=false;alert("Unable to connect.");}
}
</script>
</body>
</html>
