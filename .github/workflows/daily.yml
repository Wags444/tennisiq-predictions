name: Daily Predictions

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run-predictions:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: true

    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: "4.3"

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Install R packages
      run: Rscript install_packages.R

    - name: Create directories
      run: mkdir -p output/daily output/predictions_log

    - name: Run predictions
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      run: Rscript runtime_daily.R

    - name: Commit results
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add predictions_today.json results.json meta.json output/predictions_log/ || true
        git diff --staged --quiet || git commit -m "Predictions $(date +%a %m/%d/%Y)"
        git push
